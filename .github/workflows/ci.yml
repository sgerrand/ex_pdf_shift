name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  required:
    name: Required
    needs: [docs, markdown, test]
    runs-on: ubuntu-latest

    steps:
      - name: Status of workflow jobs
        run: echo 'All jobs in this workflow have successfully run'

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Elixir
      id: setup-beam
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        version-file: '.tool-versions'
        version-type: 'strict'
    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-${{ env.MIX_ENV }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ steps.setup-beam.outputs.otp-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-${{ env.MIX_ENV }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ steps.setup-beam.outputs.otp-version }}-
    - name: Install and compile dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        # shellcheck disable=SC1010
        mix do deps.get --only ${{ env.MIX_ENV }}, deps.compile
    - name: Generate documentation
      run: mix docs --warnings-as-errors

  markdown:
    name: Markdown
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Lint Markdown
      uses: akiomik/mado@9b5cb3a1d234ddbacad4dd811aaa2a1e671d5306 # v0.3.0

  test:
    name: Tests [Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}]
    runs-on: ubuntu-latest

    permissions:
      statuses: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - { elixir: '1.15', otp: '25' }
          - { elixir: '1.15', otp: '26' }
          - { elixir: '1.16', otp: '25' }
          - { elixir: '1.16', otp: '26' }
          - { elixir: '1.17', otp: '25' }
          - { elixir: '1.17', otp: '26' }
          - { elixir: '1.17', otp: '27' }
          - { elixir: '1.18', otp: '25' }
          - { elixir: '1.18', otp: '26' }
          - { elixir: '1.18', otp: '27' }
          - { elixir: '1.19', otp: '26' }
          - { elixir: '1.19', otp: '27' }
          - { elixir: '1.19', otp: '28' }
          - { elixir: '1.20', otp: '27' }
          - { elixir: '1.20', otp: '28' }
          - { elixir: '1.20', otp: '29', lint: true }

    env:
      MIX_ENV: test

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Elixir
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        elixir-version: ${{matrix.elixir}}
        otp-version: ${{matrix.otp}}
    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-${{ env.MIX_ENV }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-${{ env.MIX_ENV }}-${{ matrix.otp }}-${{ matrix.elixir }}-
    - name: Install and compile dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        # shellcheck disable=SC1010
        mix do deps.get --only ${{ env.MIX_ENV }}, deps.compile
    - name: Check that mix.lock is up to date
      run: mix deps.get --check-locked
      if: ${{ matrix.lint }}
    - name: Check that files are formatted
      run: mix format --check-formatted
      if: ${{ matrix.lint }}
    - name: Check for unused dependencies
      run: mix deps.unlock --check-unused
      if: ${{ matrix.lint }}
    - name: Compile code
      run: mix compile --warnings-as-errors
    - name: Run static code analysis
      run: mix credo --strict
      if: ${{ matrix.lint }}
    - name: Run tests
      run: mix test --warnings-as-errors
      if: ${{ !matrix.lint }}
    - name: Run tests with coverage
      run: mix coveralls.lcov --warnings-as-errors
      if: ${{ matrix.lint }}
    - name: Post coverage to Coveralls
      uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
      if: ${{ matrix.lint }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: cover/lcov.info
